<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GHL Pipelines SOP</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
    background: #fff;
    color: #000;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 30px 60px;
}

/* BIG LOGO */
.logo {
    height: 120px;
    object-fit: contain;
}

/* SEARCH */
.search-bar {
    padding: 12px 18px;
    width: 280px;
    border: 1px solid #000;
    border-radius: 10px;
    font-size: 14px;
}

/* TITLE */
h1 {
    text-align: center;
    font-weight: 600;
    letter-spacing: 2px;
    margin-top: -10px;
    margin-bottom: 10px;
}

/* LAYOUT */
.container {
    display: flex;
    gap: 25px;
    padding: 20px 60px 40px;
}

.column {
    flex: 1;
    background: #fafafa;
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.column h2 {
    text-align: center;
    font-weight: 600;
    margin-bottom: 15px;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 13px;
    margin: 6px 0;
    background: #000;
    color: #fff;
    border: 1px solid #000;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.25s ease;
}

.btn:hover {
    background: #fff;
    color: #000;
}

.btn:active {
    transform: scale(0.97);
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
}

.modal-content {
    background: #fff;
    margin: 4% auto;
    padding: 30px;
    width: 55%;
    border-radius: 18px;
    box-shadow: 0 25px 80px rgba(0,0,0,0.2);
    max-height: 80vh;
    overflow-y: auto;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(25px);}
    to {opacity:1; transform: translateY(0);}
}

.close {
    float: right;
    font-size: 26px;
    cursor: pointer;
}

ul { padding-left: 20px; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

</style>
</head>

<body>

<header>
<input type="text" class="search-bar" placeholder="Search SOP...">
<img src="logo.png" class="logo">
</header>

<h1>GHL Pipelines SOP</h1>

<div class="container">

<!-- ONBOARDING -->
<div class="column">
<h2>Onboarding Pipeline</h2>
<button class="btn" onclick="openModal('hold')">Hold – Deposit Only</button>
<button class="btn" onclick="openModal('kickoff')">Kickoff Call</button>
<button class="btn" onclick="openModal('booked')">Booked for Onboarding</button>
<button class="btn" onclick="openModal('kyc')">Waiting for KYC/KYB Approval</button>
<button class="btn" onclick="openModal('funding')">Waiting to Go Live (Funding Pending)</button>
<button class="btn" onclick="openModal('live')">Live & Connected</button>
<button class="btn" onclick="openModal('pause')">On Pause (Client Request)</button>
<button class="btn" onclick="openModal('nr')">Non-Responsive</button>
<button class="btn" onclick="openModal('refund1')">Refund Requested</button>
</div>

<!-- ACTIVE -->
<div class="column">
<h2>Active Pipeline</h2>
<button class="btn" onclick="openModal('live30')">Live (&lt;30 Days)</button>
<button class="btn" onclick="openModal('d30')">30 Days: Educate & AR</button>
<button class="btn" onclick="openModal('d60')">60 Days: Educate & AR</button>
<button class="btn" onclick="openModal('d90')">90 Days</button>
<button class="btn" onclick="openModal('d120')">120 Days</button>
<button class="btn" onclick="openModal('active120')">Active Clients (&gt;120 Days)</button>
<button class="btn" onclick="openModal('refund2')">Refund Requested</button>
</div>

<!-- REFUNDS -->
<div class="column">
<h2>Refunds Pipeline</h2>
<button class="btn" onclick="openModal('r1')">Refund Requested</button>
<button class="btn" onclick="openModal('r2')">Review in Progress</button>
<button class="btn" onclick="openModal('r3')">Denied</button>
<button class="btn" onclick="openModal('r4')">Pass to Sales</button>
<button class="btn" onclick="openModal('r5')">Booked with Adam</button>
<button class="btn" onclick="openModal('r6')">Booked with Luc</button>
<button class="btn" onclick="openModal('r7')">Saved – Action Required</button>
<button class="btn" onclick="openModal('r8')">Saved – No Action Required</button>
<button class="btn" onclick="openModal('r9')">Completed</button>
<button class="btn" onclick="openModal('r10')">Chargeback</button>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>
<div id="modalText"></div>
</div>
</div>

<script>

const data = {

// ONBOARDING
hold:`<ul><li><b>Responsible:</b> Sales</li><li><b>Overview:</b> Clients who have made a partial payment but have not yet completed the full required funding. Onboarding is temporarily on hold at this stage.</li><li><b>Key Notes:</b><ul><li>Full onboarding cannot proceed until payment is completed</li><li>In select cases, Sales may request early onboarding with a deposit only</li><li>Early onboarding requires internal approval</li></ul></li><li><b>Action Required:</b><ul><li>Follow up with client for remaining balance</li><li>Submit approval request if early onboarding is needed</li></ul></li></ul>`,

kickoff:`<ul><li><b>Responsible:</b> Sales</li><li><b>Overview:</b> Initial engagement call where the deal is finalized, and client expectations are clearly established prior to onboarding.</li><li><b>Key Notes:</b><ul><li>Confirms client commitment and readiness</li><li>Reviews product/service scope, timelines, and next steps</li><li>Aligns expectations on performance, risks, and onboarding process</li></ul></li><li><b>Action Required:</b><ul><li>Conduct call and confirm agreement</li><li>Ensure client understands onboarding requirements</li><li>Transition client to Account Management</li></ul></li></ul>`,

booked:`<ul><li><b>Responsible:</b> Account Manager</li><li><b>Overview:</b> Client has signed the contract and is officially scheduled for onboarding with the Account Manager.</li><li><b>Key Notes:</b><ul><li>Automated introduction email is triggered upon booking</li><li>Marks formal handoff from Sales to Account Management</li></ul></li><li><b>Action Required:</b><ul><li>Prepare onboarding materials</li><li>Confirm scheduled meeting</li><li>Initiate client relationship and onboarding guidance</li></ul></li></ul>`,

kyc:`<ul><li><b>Responsible:</b> Account Manager</li><li><b>Overview:</b> Client is undergoing brokerage account setup, including identity verification (KYC/KYB).</li><li><b>Key Notes:</b><ul><li>Includes account registration and document submission</li><li>Timeline depends on broker processing speed</li><li>Delays may occur due to incomplete or incorrect documentation</li></ul></li><li><b>Action Required:</b><ul><li>Assist client with submission requirements</li><li>Monitor verification progress</li><li>Follow up with broker if needed</li></ul></li></ul>`,

funding:`<ul><li><b>Responsible:</b> Account Manager</li><li><b>Overview:</b> All systems and accounts are set up, but trading has not yet started due to pending fund transfer.</li><li><b>Key Notes:</b><ul><li>Funding timelines vary based on broker and payment method</li><li>No trading activity until funds are fully received and allocated</li></ul></li><li><b>Action Required:</b><ul><li>Confirm funding instructions with client</li><li>Track transfer status</li><li>Coordinate with broker for confirmation</li></ul></li></ul>`,

live:`<ul><li><b>Responsible:</b> Account Manager</li><li><b>Overview:</b> The client account is fully operational, funded, and actively trading.</li><li><b>Key Notes:</b><ul><li>System is live and executing trades</li><li>Client is now in active account management phase</li></ul></li><li><b>Action Required:</b><ul><li>Monitor account performance</li><li>Provide regular updates and support</li><li>Ensure client satisfaction and retention</li></ul></li></ul>`,

pause:`<ul><li><b>Responsible:</b> Account Manager</li><li><b>Overview:</b> Onboarding or trading activity is temporarily paused at the client’s request.</li><li><b>Common Reasons:</b><ul><li>Pending funds availability</li><li>IRA or compliance processing</li><li>Personal or financial readiness</li></ul></li><li><b>Action Required:</b><ul><li>Document reason for pause</li><li>Maintain periodic follow-ups</li><li>Resume onboarding once client is ready</li></ul></li></ul>`,

nr:`<ul><li><b>Responsible:</b> Account Manager</li><li><b>Overview:</b> Client has not responded after multiple outreach attempts.</li><li><b>Criteria:</b><ul><li>Minimum of three consecutive follow-ups with no response</li><li>Occurs after initial onboarding scheduling</li></ul></li><li><b>Action Required:</b><ul><li>Log all outreach attempts</li><li>Send final follow-up notice</li><li>Escalate or reassign if necessary</li></ul></li></ul>`,

refund1:`<ul><li><b>Responsible:</b> Account Manager</li><li><b>Overview:</b> The client has formally requested a refund.</li><li><b>Key Notes:</b><ul><li>De-escalation efforts must be attempted prior to processing</li><li>If client confirms intent, case proceeds to refund stage</li></ul></li><li><b>Action Required:</b><ul><li>Move deal to this stage</li><li>Submit refund request using required template</li><li>Send details to #cast-endorsement (Slack)</li><li>Update all relevant notes in GHL</li></ul></li></ul>`,

// ACTIVE
live30:`<ul><li><b>Responsible:</b> Account Manager (AM)</li><li><b>Overview:</b> Client has completed onboarding and the account has started trading Account age is less than 30 days</li><li><b>Key Notes:</b><ul><li>Focus on monitoring early performance and stability</li><li>Ensure client is properly guided during initial trading phase</li></ul></li><li><b>Action Required:</b><ul><li>Maintain regular communication with client</li><li>Monitor account activity and flag any concerns</li><li>Add relevant updates and notes in GHL</li></ul></li></ul>`,

d30:`<ul><li><b>Responsible:</b> Account Manager (AM)</li><li><b>Overview:</b> Client has been trading for 30 days First performance review checkpoint</li><li><b>Key Notes:</b><ul><li>Review account performance and initial results</li><li>Set proper expectations with the client</li><li>PENDING: Confirm if email is automated or manually triggered by AM</li></ul></li><li><b>Action Required:</b><ul><li>Conduct 30-day review with client</li><li>Discuss performance insights and expectations</li><li>Send review email (manual or automated TBD)</li><li>Update notes in GHL</li></ul></li></ul>`,

d60:`<ul><li><b>Responsible:</b> Account Manager (AM)</li><li><b>Overview:</b> Client has been trading for 60 days Performance comparison checkpoint</li><li><b>Key Notes:</b><ul><li>Compare 30-day vs 60-day performance</li><li>Highlight improvements, consistency, or concerns</li><li>PENDING: Confirm if email is automated or manually triggered by AM</li></ul></li><li><b>Action Required:</b><ul><li>Conduct comparison review with client</li><li>Present insights between 30-day and 60-day data</li><li>Send review email (manual or automated TBD)</li><li>Update notes in GHL</li></ul></li></ul>`,

d90:`<ul><li><b>Responsible:</b> Account Manager (AM)</li><li><b>Overview:</b> Client has been trading for 90 days Full performance evaluation stage</li><li><b>Key Notes:</b><ul><li>Review overall system performance (highs and lows)</li><li>Provide a realistic performance outlook</li><li>PENDING: Confirm if email is automated or manually triggered by AM</li></ul></li><li><b>Action Required:</b><ul><li>Conduct 90-day performance discussion</li><li>Align expectations based on full-cycle performance</li><li>Send review email (manual or automated TBD)</li><li>Update notes in GHL</li></ul></li></ul>`,

d120:`<ul><li><b>Responsible:</b> Kayla / Sales</li><li><b>Overview:</b> Client has reached 120 days of trading Evaluation for expansion opportunities</li><li><b>Key Notes:</b><ul><li>Identify opportunities for diversification</li><li>Assess readiness for upsell</li></ul></li><li><b>Action Required:</b><ul><li>Review account for upsell potential</li><li>Coordinate with Sales if an opportunity is identified</li><li>Document findings and actions in GHL</li></ul></li></ul>`,

active120:`<ul><li><b>Responsible:</b> Account Manager (AM)</li><li><b>Overview:</b> Clients trading for more than 120 days Long-term account management stage</li><li><b>Key Notes:</b><ul><li>Focus on retention and relationship management</li><li>Continuous monitoring and engagement</li></ul></li><li><b>Action Required:</b><ul><li>Maintain ongoing communication</li><li>Monitor performance and client satisfaction</li><li>Update notes and engagement history in GHL</li></ul></li></ul>`,

refund2:`<ul><li><b>Responsible:</b> Account Manager (AM)</li><li><b>Overview:</b> The client has formally requested a refund</li><li><b>Key Notes:</b><ul><li>De-escalation efforts must be attempted prior to processing</li><li>If client confirms intent, case proceeds to refund stage</li></ul></li><li><b>Action Required:</b><ul><li>Move deal to this stage</li><li>Submit refund request using required template</li><li>Send details to #cast-endorsement (Slack)</li><li>Update all relevant notes in GHL</li></ul></li></ul>`,

// REFUNDS
r1:`<ul><li><b>Responsible:</b> Account Manager (AM)</li><li><b>Overview:</b> The client has formally requested a refund</li><li><b>Key Notes:</b><ul><li>De-escalation efforts must be attempted prior to processing</li><li>If client confirms intent, case proceeds to refund stage</li></ul></li><li><b>Action Required:</b><ul><li>Move deal to this stage</li><li>Submit refund request using required template</li><li>Send details to #cast-endorsement (Slack)</li><li>Update all relevant notes in GHL</li></ul></li></ul>`,

r2:`<ul><li><b>Responsible:</b> Refunds Team</li><li><b>Overview:</b> Refund request has been received and is under review</li><li><b>Key Notes:</b><ul><li>Review includes account performance, settings, contract, and eligibility</li><li>Kayla/Jhezel to determine and confirm next steps for the client</li></ul></li><li><b>Action Required:</b><ul><li>Conduct full account review</li><li>Assess eligibility based on contract and performance</li><li>Align internally on next steps</li><li>Update findings and notes in GHL</li></ul></li></ul>`,

r3:`<ul><li><b>Responsible:</b> Refunds Team</li><li><b>Overview:</b> Client has been determined not eligible for a refund after review</li><li><b>Key Notes:</b><ul><li>Decision must be based on contract and account evaluation</li><li>Clear explanation and support must be provided to the client</li></ul></li><li><b>Action Required:</b><ul><li>Send email to client explaining review outcome</li><li>Provide alternative options or assistance</li><li>Document communication and outcome in GHL</li></ul></li></ul>`,

r4:`<ul><li><b>Responsible:</b> Account Manager (AM)</li><li><b>Overview:</b> Case is redirected to Sales instead of continuing refund process</li><li><b>Key Notes:</b><ul><li>Common for clients not yet onboarded</li><li>Typically involves claims of being misinformed during sales process</li><li>Kayla/Jhezel to confirm decision</li></ul></li><li><b>Action Required:</b><ul><li>Coordinate with Sales team for reassessment</li><li>Transfer relevant details and context</li><li>Update notes and status in GHL</li></ul></li></ul>`,

r5:`<ul><li><b>Responsible:</b> Account Manager (AM)</li><li><b>Overview:</b> Client has been endorsed to Adam for further assistance</li><li><b>Key Notes:</b><ul><li>Used for escalation or deeper client handling</li></ul></li><li><b>Action Required:</b><ul><li>Schedule and confirm booking with Adam</li><li>Ensure client attendance and preparation</li><li>Log updates and outcomes in GHL</li></ul></li></ul>`,

r6:`<ul><li><b>Responsible:</b> Account Manager (AM)</li><li><b>Overview:</b> Client has been endorsed to Luc for further assistance</li><li><b>Key Notes:</b><ul><li>Used for escalation or specialized handling</li></ul></li><li><b>Action Required:</b><ul><li>Schedule and confirm booking with Luc</li><li>Ensure client attendance and preparation</li><li>Log updates and outcomes in GHL</li></ul></li></ul>`,

r7:`<ul><li><b>Responsible:</b> Refunds Team</li><li><b>Overview:</b> Client agreed to stay after being offered a retention option</li><li><b>Key Notes:</b><ul><li>Offers may include switching software or discounted/free additions</li><li>AM must execute the agreed next steps</li></ul></li><li><b>Action Required:</b><ul><li>Refunds Team to inform AM of agreed arrangement</li><li>AM to implement changes (software switch, add-ons, etc.)</li><li>Confirm setup with client</li><li>Update all notes in GHL</li></ul></li></ul>`,

r8:`<ul><li><b>Responsible:</b> Refunds Team</li><li><b>Overview:</b> Client decided not to proceed with refund and continue trading</li><li><b>Key Notes:</b><ul><li>No further changes required on the account</li></ul></li><li><b>Action Required:</b><ul><li>Confirm client decision</li><li>Ensure account continues running smoothly</li><li>Update notes in GHL</li></ul></li></ul>`,

r9:`<ul><li><b>Responsible:</b> Accounting</li><li><b>Overview:</b> Refund has been successfully processed and completed</li><li><b>Key Notes:</b><ul><li>Funds have been transferred to the client</li></ul></li><li><b>Action Required:</b><ul><li>Confirm successful transaction</li><li>Notify relevant teams if needed</li><li>Update final notes and status in GHL</li></ul></li></ul>`,

r10:`<ul><li><b>Responsible:</b> Accounting</li><li><b>Overview:</b> Client has initiated a chargeback</li><li><b>Key Notes:</b><ul><li>May occur before or after contacting support</li><li>Requires immediate internal attention</li></ul></li><li><b>Action Required:</b><ul><li>Record chargeback details</li><li>Coordinate with relevant teams for resolution</li><li>Update all notes and documentation in GHL</li></ul></li></ul>`

};

function openModal(k){
document.getElementById("modal").style.display="block";
document.getElementById("modalText").innerHTML=data[k];
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
